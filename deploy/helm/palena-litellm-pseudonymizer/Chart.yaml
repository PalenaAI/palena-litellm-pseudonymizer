apiVersion: v2
name: palena-litellm-pseudonymizer
description: >-
  Pseudonymization guardrail for the LiteLLM proxy — replaces real entity
  names with consistent fictional ones before the LLM sees them and reverses
  the substitution in the response. Ships the Go guardrail service and,
  optionally, its Redis + Presidio (Analyzer & Image Redactor) dependencies.
type: application
# Chart version — bump on chart changes.
version: 0.2.0
# App version — the guardrail service image tag this chart defaults to.
appVersion: "0.2.0"
keywords:
  - litellm
  - guardrail
  - pii
  - pseudonymization
  - presidio
home: https://github.com/PalenaAI/palena-litellm-pseudonymizer
sources:
  - https://github.com/PalenaAI/palena-litellm-pseudonymizer
maintainers:
  - name: bitkaio LLC
    url: https://bitkaio.com
