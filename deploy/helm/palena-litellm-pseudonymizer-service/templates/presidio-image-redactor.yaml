{{- if .Values.presidio.imageRedactor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pseudonymizer.imageRedactor.fullname" . }}
  labels:
    {{- include "pseudonymizer.labels" . | nindent 4 }}
    app.kubernetes.io/component: presidio-image-redactor
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pseudonymizer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: presidio-image-redactor
  template:
    metadata:
      labels:
        {{- include "pseudonymizer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: presidio-image-redactor
    spec:
      containers:
        - name: image-redactor
          image: {{ .Values.presidio.imageRedactor.image | quote }}
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.presidio.imageRedactor.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pseudonymizer.imageRedactor.fullname" . }}
  labels:
    {{- include "pseudonymizer.labels" . | nindent 4 }}
    app.kubernetes.io/component: presidio-image-redactor
spec:
  ports:
    - port: 3000
      targetPort: http
      name: http
  selector:
    {{- include "pseudonymizer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: presidio-image-redactor
{{- end }}
