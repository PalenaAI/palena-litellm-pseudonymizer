services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      retries: 15

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    ports: ["5001:3000"]
    # Mount custom configs so ORGANIZATION is detected: nlp.yaml enables the
    # spaCy ORG label (off by default), recognizers.yaml adds an exact-match
    # deny-list of known company names. See deploy/presidio/.
    volumes:
      - ./deploy/presidio/nlp.yaml:/app/presidio_analyzer/conf/default.yaml:ro
      - ./deploy/presidio/recognizers.yaml:/app/presidio_analyzer/conf/default_recognizers.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/health"]
      interval: 5s
      retries: 30

  presidio-image-redactor:
    image: mcr.microsoft.com/presidio-image-redactor:latest
    ports: ["5003:3000"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/health"]
      interval: 5s
      retries: 30
